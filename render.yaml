services:
  - type: web
    name: python-tts
    env: python
    buildCommand: |
      apt-get update && apt-get install -y ffmpeg
      pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120 --log-level info wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
