---
# Codacy configuration file

# Enable coverage
coverage:
  # Coverage reports location
  paths:
    - coverage.xml
  # Coverage threshold
  threshold: 77

# Code patterns
engines:
  # Enable specific engines
  pylint:
    enabled: true
  bandit:
    enabled: true
  prospector:
    enabled: true

# Exclude specific paths from analysis
exclude_paths:
  - "tests/**"
  - "**/__pycache__/**"
  - "**/venv/**"
  - "**/.venv/**"
  - "htmlcov/**"
  - "build/**"
  - "dist/**"
  - "*.egg-info/**"
  - "docs/**"
  - "deploy/postgres/**"
  # Postgres init scripts are intentionally not SQL Server scripts; rules such
  # as SET QUOTED_IDENTIFIER do not apply to this dialect.
  - "deploy/k8s/base/postgres-initdb/**"

# Transform paths (if needed)
transform_paths:
  - source: "/"
    target: "/"
