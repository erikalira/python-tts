[pytest]
# Pytest configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
cache_dir = .test-artifacts/.pytest_cache
tmp_path_retention_policy = none
tmp_path_retention_count = 0

# Coverage configuration
addopts = 
    --verbose
    --basetemp=.test-artifacts/pytest-temp
    --cov=src/core
    --cov=src/application
    --cov=src/infrastructure/tts
    --cov=src/presentation
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=10
    --cov-config=.coveragerc
    -p no:cacheprovider
    -v

# Asyncio configuration
asyncio_mode = auto

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    network: Tests that require network connection
    asyncio: Async tests

# Ignore paths
norecursedirs = 
    .git
    .venv
    __pycache__
    *.egg-info
    build
    dist
