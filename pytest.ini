[pytest]
# Pytest configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage configuration
addopts = 
    --verbose
    --cov=src/core
    --cov=src/application
    --cov=src/infrastructure/tts
    --cov=src/presentation
    --cov=src/bot.py
    --cov=src/app.py
    --cov=wsgi.py
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=68
    -v

# Asyncio configuration
asyncio_mode = auto

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    network: Tests that require network connection
    asyncio: Async tests

# Ignore paths
norecursedirs = 
    .git
    .venv
    __pycache__
    *.egg-info
    build
    dist
