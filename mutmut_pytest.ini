[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
cache_dir = .test-artifacts/.pytest_cache_mutmut
tmp_path_retention_policy = none
tmp_path_retention_count = 0
asyncio_mode = auto
addopts =
    --basetemp=.test-artifacts/pytest-temp-mutmut
    -p no:cacheprovider

markers =
    unit: Unit tests
    integration: Integration tests
    redis: Tests that require a real Redis service
    slow: Slow tests
    load: Load baseline tests
    chaos: Dependency-failure and fault-injection tests
    network: Tests that require network connection
    asyncio: Async tests

norecursedirs =
    .git
    .venv
    __pycache__
    *.egg-info
    build
    dist
