name: Deploy Discord Bot to Windows Server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-bot-windows-main
  cancel-in-progress: false

jobs:
  test:
    name: Validate before deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            espeak-ng \
            ffmpeg

      - name: Install dependencies
        run: |
          uv sync --locked --group test

      - name: Run tests
        env:
          CI: true
          PYTHONPATH: ${{ github.workspace }}
        run: |
          uv run pytest --tb=short -v --cov --cov-report=xml

  deploy-bot:
    name: Deploy to self-hosted Windows runner
    needs: test
    runs-on: [self-hosted, windows, bot-server]

    steps:
      - name: Ensure repository path exists
        shell: pwsh
        run: |
          $repoPath = "C:\services\tts-hotkey-windows"
          if (-not (Test-Path $repoPath)) {
            throw "Expected repository path '$repoPath' does not exist on the Windows server runner."
          }

      - name: Update repository to origin/main
        shell: pwsh
        run: |
          Set-Location "C:\services\tts-hotkey-windows"
          git fetch origin main
          git pull --ff-only origin main

      - name: Install or refresh WinSW service
        shell: pwsh
        run: |
          Set-Location "C:\services\tts-hotkey-windows"
          powershell -ExecutionPolicy Bypass -File .\deploy\winsw\install-or-update-service.ps1

      - name: Verify Windows service status
        shell: pwsh
        run: |
          $service = Get-Service -Name "tts-discord-bot" -ErrorAction Stop
          if ($service.Status -ne "Running") {
            throw "Windows service 'tts-discord-bot' is not running. Current status: $($service.Status)"
          }
          Write-Host "Windows service status: $($service.Status)"
