name: Test Workflow

on: [push, pull_request]

jobs:
  critical-tests:
    name: Critical Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            espeak-ng \
            ffmpeg

      - name: Install dependencies
        run: |
          uv sync --locked --group test

      - name: Run lint gate
        run: |
          uv run ruff check .

      - name: Run type-check gate
        run: |
          uv run pyright

      - name: Run critical test suite with coverage
        if: runner.os == 'Linux'
        env:
          CI: true
          PYTHONPATH: ${{ github.workspace }}
        run: |
          uv run pytest tests/unit tests/smoke --tb=short -v

      - name: Enforce coverage quality gates
        if: runner.os == 'Linux'
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          uv run python scripts/test/quality_gates.py coverage --coverage-xml coverage.xml --config config/quality_gates.json

      - name: Run critical test suite
        if: runner.os == 'Windows'
        env:
          CI: true
          PYTHONPATH: ${{ github.workspace }}
        run: |
          uv run pytest tests/unit tests/smoke --tb=short -v --no-cov

      - name: Upload coverage artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: critical-coverage-xml
          path: coverage.xml
          if-no-files-found: error

      - name: Upload coverage to Codacy
        if: runner.os == 'Linux'
        continue-on-error: true
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          if [ -n "$CODACY_PROJECT_TOKEN" ]; then
            echo "Uploading coverage to Codacy..."
            bash <(curl -Ls https://coverage.codacy.com/get.sh) report -r coverage.xml
          else
            echo "CODACY_PROJECT_TOKEN not set, skipping coverage upload"
          fi

  redis-integration:
    name: Redis Integration
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            espeak-ng \
            ffmpeg \
            redis-tools

      - name: Install dependencies
        run: |
          uv sync --locked --group test

      - name: Wait for Redis service
        run: |
          redis-cli -h 127.0.0.1 -p 6379 ping

      - name: Run Redis integration suite
        env:
          CI: true
          PYTHONPATH: ${{ github.workspace }}
          RUN_REDIS_INTEGRATION_TESTS: "1"
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: "6379"
          REDIS_DB: "15"
        run: |
          uv run pytest tests/integration/infrastructure/test_audio_queue_redis_integration.py tests/integration/bot_runtime/test_queue_worker_redis_integration.py --tb=short -v --no-cov

  external-integrations:
    name: External Integrations (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: network-linux
            os: ubuntu-latest
            pytest_args: tests/integration/infrastructure/test_engines_integration.py -m "integration and network"
          - name: windows-os
            os: windows-latest
            pytest_args: tests/integration/infrastructure/test_engines_integration.py -k "Pyttsx3"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            espeak-ng \
            ffmpeg

      - name: Install dependencies
        run: |
          uv sync --locked --group test

      - name: Run external integration slice
        env:
          CI: true
          PYTHONPATH: ${{ github.workspace }}
          RUN_NETWORK_INTEGRATION_TESTS: ${{ runner.os == 'Linux' && '1' || '0' }}
        run: |
          uv run pytest ${{ matrix.pytest_args }} --tb=short -v --no-cov
