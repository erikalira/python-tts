name: Test Workflow

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Set up Python
        uses: actions/setup-python@65d7f2d534ac1bc67fcd62888c5f4f3d2cb2b236 # v4.7.1
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@88522ab9f39a2ea568f7027eddc7d8d8bc9d59c8 # v3.3.1
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            portaudio19-dev \
            python3-pyaudio \
            espeak \
            espeak-data \
            libespeak1 \
            libespeak-dev \
            ffmpeg \
            alsa-utils \
            pulseaudio

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run tests with coverage
        env:
          CI: true
        run: |
          export PYTHONPATH="${PYTHONPATH}:${PWD}"
          pytest --tb=short -v --cov --cov-report=xml

      - name: Check if coverage.xml exists
        run: |
          if [ -f coverage.xml ]; then
            echo "Coverage file exists"
            ls -la coverage.xml
          else
            echo "Coverage file not found"
            exit 1
          fi

      - name: Upload coverage to Codacy
        continue-on-error: true
        run: |
          if [ -n "$CODACY_PROJECT_TOKEN" ]; then
            echo "Uploading coverage to Codacy..."
            bash <(curl -Ls https://coverage.codacy.com/get.sh) report -r coverage.xml
          else
            echo "CODACY_PROJECT_TOKEN not set, skipping coverage upload"
          fi
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}

      - name: Upload coverage to Codecov (alternative)
        uses: codecov/codecov-action@fa9a6909dc02281d24b410b6ee3dd8c5675a2e76 # v4.3.0
        continue-on-error: true
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
