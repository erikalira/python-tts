name: Build Windows Executable

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: |
          uv sync --locked --group build

      - name: Build executable
        shell: pwsh
        run: |
          Write-Host "Building current Desktop App executable from app.py..."
          ./scripts/build/build_clean_architecture.ps1

      - name: Test executable
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/HotkeyTTS.exe")) {
            Write-Error "dist/HotkeyTTS.exe was not generated"
          }
          Get-ChildItem dist
          Write-Host "Executable size: $([math]::Round((Get-Item 'dist/HotkeyTTS.exe').Length / 1MB, 2)) MB"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-app-windows-exe
          path: |
            dist/HotkeyTTS.exe
            dist/run_HotkeyTTS_debug.bat
          retention-days: 30

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $releaseNotes = @"
          ## Desktop App - Windows Executable

          ### Resources:
          - Current Desktop App runtime based on `app.py`
          - Configurable hotkeys
          - Multi-engine TTS with fallback
          - Integrated GUI
          - Current clean architecture build

          ### How to use:
          1. Download `HotkeyTTS.exe` or `run_HotkeyTTS_debug.bat`
          2. Run it directly on Windows
          3. Configure Discord, TTS, and hotkeys on first launch
          4. Use the Desktop App normally

          **Compatibility**: Windows 10/11
          "@

          gh release create "${{ github.ref_name }}" `
            "dist/HotkeyTTS.exe" `
            "dist/run_HotkeyTTS_debug.bat" `
            --title "Desktop App ${{ github.ref_name }}" `
            --notes $releaseNotes `
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
