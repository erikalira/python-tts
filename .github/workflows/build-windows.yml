name: Build Windows Executable

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch: # Permite executar manualmente

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable
        shell: pwsh
        run: |
          Write-Host "Building current standalone executable from app.py..."
          ./scripts/build/build_clean_architecture.ps1 -SkipTests

      - name: Test executable
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/tts_hotkey_clean.exe")) {
            Write-Error "dist/tts_hotkey_clean.exe was not generated"
          }
          Get-ChildItem dist
          Write-Host "Executable size: $([math]::Round((Get-Item 'dist/tts_hotkey_clean.exe').Length / 1MB, 2)) MB"

      - name: Upload Artifact (sempre)
        uses: actions/upload-artifact@v4
        with:
          name: tts-hotkey-windows-exe
          path: |
            dist/tts_hotkey_clean.exe
            dist/run_tts_hotkey_clean.bat
          retention-days: 30

      - name: Create Release (só em tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/tts_hotkey_clean.exe
            dist/run_tts_hotkey_clean.bat
          name: "TTS Hotkey ${{ github.ref_name }}"
          body: |
            ## 🎯 TTS Hotkey Clean Architecture - Windows Executable

            ### ✨ Recursos:
            - 🎤 Runtime standalone atual baseado em `app.py`
            - ⌨️ Hotkeys configuráveis
            - 🔊 Multi-engine TTS com fallback
            - 📱 Interface gráfica integrada
            - 🚀 Build atual de Clean Architecture

            ### 📥 Como usar:
            1. Baixe `tts_hotkey_clean.exe` ou `run_tts_hotkey_clean.bat`
            2. Execute diretamente no Windows
            3. Configure Discord, TTS e hotkeys na primeira execução
            4. Use o app standalone normalmente

            **Tamanho**: ~30MB | **Compatibilidade**: Windows 10/11
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
