name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing semantic tag to release, for example v1.2.3"
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            espeak-ng \
            ffmpeg

      - name: Install dependencies
        run: |
          uv sync --locked --group test

      - name: Run release validation
        env:
          CI: true
          PYTHONPATH: ${{ github.workspace }}
        run: |
          uv run ruff check .
          uv run pyright
          uv run pytest tests/unit tests/smoke --tb=short -v

  publish-bot-image:
    name: Publish Bot Image
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image_name }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Resolve release version
        id: version
        run: |
          if [ -n "${{ inputs.release_tag }}" ]; then
            echo "version=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve image name
        id: image
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image_name=ghcr.io/${owner}/tts-hotkey-windows-bot" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ steps.image.outputs.image_name }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(steps.version.outputs.version, 'v') }}
          labels: |
            org.opencontainers.image.title=tts-hotkey-windows-bot
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            VCS_REF=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  github-release:
    name: Create GitHub Release
    needs: publish-bot-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.publish-bot-image.outputs.version }}
          BOT_IMAGE: ${{ needs.publish-bot-image.outputs.image }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            generated_notes="$(gh release view "$RELEASE_TAG" --json body -q .body)"
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes
            generated_notes="$(gh release view "$RELEASE_TAG" --json body -q .body)"
          fi

          release_notes_file="$(mktemp)"
          cat > "$release_notes_file" <<EOF
          ## Release Artifacts

          - Bot image: \`${BOT_IMAGE}:${RELEASE_TAG}\`
          - Rollback image tag: record the previous production \`APP_VERSION\` before deploy

          ## Validation

          - Release workflow validation passed before image publish
          - Docker image was built from \`${GITHUB_SHA}\`

          ${generated_notes}
          EOF

          gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file "$release_notes_file"
