name: Security

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4

  pip-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: |
          uv sync --locked --group security

      - name: Audit runtime dependencies
        run: |
          uv run pip-audit -r requirements.txt

      - name: Audit test dependencies
        run: |
          uv run pip-audit -r requirements-test.txt

  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: |
          uv sync --locked --group security

      - name: Generate Python dependency SBOMs
        run: |
          mkdir -p sbom
          uv run cyclonedx-py requirements requirements.txt --output-reproducible --of JSON -o sbom/python-runtime.cdx.json
          uv run cyclonedx-py requirements requirements-test.txt --output-reproducible --of JSON -o sbom/python-test.cdx.json

      - name: Build Docker image for SBOM
        run: |
          docker build \
            --build-arg APP_VERSION="${GITHUB_SHA}" \
            --build-arg VCS_REF="${GITHUB_SHA}" \
            -t tts-hotkey-windows-bot:${GITHUB_SHA} .

      - name: Generate Docker image SBOM
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # v0.33.1
        with:
          image-ref: tts-hotkey-windows-bot:${{ github.sha }}
          format: cyclonedx
          output: sbom/docker-image.cdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cyclonedx-sboms
          path: sbom/*.cdx.json
          if-no-files-found: error

  docker-image-scan:
    name: Docker Image Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Docker image for scan
        run: |
          docker build \
            --build-arg APP_VERSION="${GITHUB_SHA}" \
            --build-arg VCS_REF="${GITHUB_SHA}" \
            -t tts-hotkey-windows-bot:${GITHUB_SHA} .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # v0.33.1
        with:
          image-ref: tts-hotkey-windows-bot:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Verify Trivy SARIF was generated
        run: test -s trivy-results.sarif

      - name: Upload Trivy SARIF
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

      - name: Upload Trivy scan artifact
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: trivy-docker-image-scan
          path: trivy-results.sarif
          if-no-files-found: error

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
