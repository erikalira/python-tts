name: Infrastructure

on:
  pull_request:
    paths:
      - "infra/**"
      - "deploy/k8s/**"
      - ".github/workflows/iac.yml"
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - "deploy/k8s/**"
      - ".github/workflows/iac.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  opentofu:
    name: OpenTofu validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          tofu_wrapper: false

      - name: Setup kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4

      - name: Check formatting
        run: tofu fmt -check -recursive infra

      - name: Validate environments
        shell: bash
        run: |
          set -euo pipefail
          for environment_dir in infra/environments/*; do
            if [ -d "${environment_dir}" ]; then
              tofu -chdir="${environment_dir}" init -backend=false
              tofu -chdir="${environment_dir}" validate
            fi
          done

      - name: Validate Kustomize overlays
        shell: bash
        run: |
          set -euo pipefail
          for overlay_dir in deploy/k8s/overlays/*; do
            if [ -d "${overlay_dir}" ]; then
              kubectl kustomize "${overlay_dir}" >/dev/null
            fi
          done
