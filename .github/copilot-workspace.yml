# Copilot Workspace Configuration
# Based on .specify/memory/constitution.md v1.3.0
# Last synced: 2026-04-27

project_type: "python_multi_runtime_platform"
framework: "discord.py_aiohttp_tkinter"
architecture: "clean_architecture"

context_files:
  - ".specify/README.md"
  - ".specify/memory/constitution.md"
  - ".specify/review-checklist.md"
  - ".specify/memory/ai-pitfalls.md"
  - "README.md"
  - "docs/README.md"
  - "docs/architecture/ARCHITECTURE.md"
  - "src/bot.py"
  - "app.py"
  - "AGENTS.md"

domain_concepts:
  - "Discord bot runtime"
  - "Windows hotkey desktop runtime"
  - "Shared TTS routing and delivery"
  - "Clean architecture boundaries"
  - "Configuration management"

coding_preferences:
  - "Preserve independent execution of bot and desktop app"
  - "Avoid duplication between src/desktop and shared src modules"
  - "Keep business logic in core and application layers"
  - "Prefer small incremental refactors"
  - "Use type hints in shared and public code"
  - "Favor explicit contracts over implicit reusable payloads"
  - "Keep compatibility code narrow and document the steady state"
  - "Write code, comments, docs, specs, tests, commit messages, PR descriptions, and AI-generated project artifacts in English by default"
  - "Use another language in user-facing runtime text only for explicit localization, language-specific behavior, or locale fixtures"

testing_strategy:
  - "Run relevant unit and integration tests"
  - "Validate bot startup when bot flow changes"
  - "Validate desktop startup when desktop flow changes"
  - "Test the changed path directly when automation is not enough"
  - "Call out validation gaps explicitly when a runtime check cannot be performed"

documentation_requirements:
  - "Keep docs/ for durable guides and architecture docs"
  - "Use specs/ for feature specs, plans, and execution artifacts"
  - "Update docs/README.md when navigation changes"
  - "Treat .specify/ as canonical AI governance"
  - "Keep AGENTS.md and Copilot instruction files derivative of .specify/"
  - "Keep .agents/ and .codex/ project-specific guidance synchronized with .specify/"

naming_conventions:
  files: "snake_case"
  functions: "snake_case"
  classes: "PascalCase"
  constants: "UPPER_SNAKE_CASE"
