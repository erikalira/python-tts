services:
  redis:
    image: redis:7.4-alpine
    container_name: tts-hotkey-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: ["redis-server", "--appendonly", "yes"]

  postgres:
    image: postgres:17.9
    container_name: tts-bot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/001_bot_config_schema.sql:/docker-entrypoint-initdb.d/001_bot_config_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.139.0
    container_name: tts-bot-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./deploy/otel/collector-config.yaml:/etc/otelcol/config.yaml:ro

  tempo:
    image: grafana/tempo:2.10.4
    container_name: tts-bot-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "3200:3200"
      - "4319:4317"
    volumes:
      - ./deploy/observability/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo

  prometheus:
    image: prom/prometheus:v3.11.2
    container_name: tts-bot-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:12.4.2
    container_name: tts-bot-grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
      tempo:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/observability/grafana/provisioning/datasources/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - grafana_data:/var/lib/grafana

  bot:
    image: ${BOT_IMAGE:-tts-hotkey-windows-bot}:${APP_VERSION:-local}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-local}
        VCS_REF: ${VCS_REF:-unknown}
    container_name: tts-discord-bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
      tempo:
        condition: service_started
      prometheus:
        condition: service_started
    ports:
      - "10000:10000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import json, urllib.request; response = urllib.request.urlopen('http://127.0.0.1:10000/ready', timeout=5); payload = json.load(response); raise SystemExit(0 if response.status == 200 and payload.get('status') == 'ready' else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_BOT_HOST: 0.0.0.0
      PORT: 10000
      CONFIG_STORAGE_BACKEND: postgres
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tts_hotkey_windows}
      TTS_ENGINE: ${TTS_ENGINE:-gtts}
      TTS_LANGUAGE: ${TTS_LANGUAGE:-pt}
      TTS_VOICE_ID: ${TTS_VOICE_ID:-roa/pt-br}
      TTS_RATE: ${TTS_RATE:-180}
      MAX_TEXT_LENGTH: ${MAX_TEXT_LENGTH:-500}
      TTS_QUEUE_BACKEND: ${TTS_QUEUE_BACKEND:-redis}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-tts}
      REDIS_COMPLETED_ITEM_TTL_SECONDS: ${REDIS_COMPLETED_ITEM_TTL_SECONDS:-900}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-tts-hotkey-windows-bot}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}

volumes:
  postgres_data:
  redis_data:
  tempo_data:
  prometheus_data:
  grafana_data:
