global:
  scrape_interval: 1m
  evaluation_interval: 1m

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:9464"]

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]
